<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🦑 EGI VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs27qR_xIym3tIdNkQ2bpre5k3M9V2gGk",
    authDomain: "ego-vault.firebaseapp.com",
    projectId: "ego-vault",
    storageBucket: "ego-vault.firebasestorage.app",
    messagingSenderId: "668283185545",
    appId: "1:668283185545:web:1786c48b047be9f1941958",
    measurementId: "G-19FHWG75LS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Save all egis to Firestore
  window.saveToFirebase = async function(egis) {
    try {
      const col = collection(db, 'egis');
      // Delete all then re-add (simple approach)
      const snap = await getDocs(col);
      for (const d of snap.docs) { await deleteDoc(d.ref); }
      for (const egi of egis) {
        const e = {...egi};
        // Store photo separately if too large - just skip for now, store as-is
        await setDoc(doc(col, e.id), e);
      }
      return true;
    } catch(err) {
      console.error('Firebase save error:', err);
      return false;
    }
  };

  // Load all egis from Firestore
  window.loadFromFirebase = async function() {
    try {
      const snap = await getDocs(collection(db, 'egis'));
      const egis = [];
      snap.forEach(d => egis.push(d.data()));
      egis.sort((a,b) => parseInt(b.id) - parseInt(a.id));
      return egis;
    } catch(err) {
      console.error('Firebase load error:', err);
      return null;
    }
  };

  // Init: load from Firebase on startup
  window.addEventListener('load', async () => {
    const indicator = document.getElementById('sync-indicator');
    if (indicator) indicator.textContent = '🔄 同期中...';
    const firebaseEgis = await window.loadFromFirebase();
    if (indicator) indicator.textContent = '☁️ 同期済';
    if (firebaseEgis !== null) {
      // Always use Firebase data as the source of truth
      window._egisFromFirebase = firebaseEgis;
      // If app already initialized, reload data immediately
      if (typeof reloadFromFirebase === 'function') {
        reloadFromFirebase(firebaseEgis);
      }
    }
  });
</script>
<style>

  /* FAB */
  #fab {

  .modal-overlay {

  .btn-submit-green:disabled { background: var(--border-light); color: var(--text-light); cursor: not-allowed; }

  /* Photo upload area */
  .photo-upload-area {

  /* Lightbox */
  #lightbox {
    display: none !important;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;

    .card-grid { grid-template-columns: 1fr; }
    .header-top { flex-wrap: wrap; gap: 8px; }
    .stats { gap: 12px; }

</style>
</head>

<script>

  ['egi-modal','catch-modal','lightbox'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.style.cssText = 'display:none !important'; }

});
</script>

    color:var(--text-mid);padding:6px 12px;font-size:12px;cursor:pointer;
    font-family:inherit;white-space:nowrap;flex-shrink:0;font-weight:400;

</div>
</div>

<div id="main">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🎣</div>
    <div>まだエギが登録されていません</div>
  </div>
  <div class="card-grid" id="card-grid"></div>
</div>

<button id="fab" onclick="openAddEgiModal()">＋ エギを追加</button>

<!-- Toast -->

<!-- Add/Edit Egi Modal -->
<div class="modal-overlay" id="egi-modal" style="display:none" onclick="if(event.target===this)closeEgiModal()">
  <div class="modal">
    <div class="modal-title" id="egi-modal-title">🦑 エギを追加</div>

    <div class="form-section">
      <label class="section-label">エギの写真</label>
      <div class="photo-upload-area" id="egi-photo-area" onclick="document.getElementById('egi-photo-input').click()">
        <span class="upload-icon">📷</span>
        <span id="egi-photo-label">タップして写真を選択</span>
      </div>
      <input type="file" id="egi-photo-input" accept="image/*" style="display:none" onchange="handleEgiPhoto(event)">
      <img id="egi-photo-preview" class="photo-preview" style="display:none" src="" alt="">
      <button class="photo-remove" id="egi-photo-remove" style="display:none" onclick="removeEgiPhoto()">✕ 写真を削除</button>
    </div>

    <div class="form-section">
      <label class="section-label">エギの名前</label>
      <input type="text" class="form-input" id="f-name" placeholder="例: 春イカ用エース、常夜灯専用 など">
    </div>

    <div class="form-section">
      <label class="section-label">エギの種類</label>
      <div class="btn-row" id="f-type-btns"></div>
    </div>

    <div class="form-section">
      <label class="section-label">タイプ</label>
      <div class="btn-row" id="f-depth-btns"></div>
    </div>

    <div class="form-section">
      <label class="section-label">サイズ</label>
      <div class="btn-row" id="f-size-btns"></div>
    </div>

    <div class="form-section">
      <label class="section-label">重さ・沈下速度</label>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label style="font-size:11px;color:var(--text-light);display:block;margin-bottom:4px;">重さ (g)</label>
          <input type="number" class="form-input" id="f-weight" placeholder="例: 20" step="0.1" min="0" style="font-size:14px;">
        </div>
        <div style="flex:1;">
          <label style="font-size:11px;color:var(--text-light);display:block;margin-bottom:4px;">沈下速度 (秒/m)</label>
          <input type="number" class="form-input" id="f-sink-speed" placeholder="例: 3.5" step="0.1" min="0" style="font-size:14px;">
        </div>
      </div>
    </div>

<script>
// ============================================================
// DATA DEFINITIONS
// ============================================================
const EGI_TYPES = ['エギ王 K','ライブ','サーチ'];
const EGI_DEPTHS = ['ベーシック','シャロー','スーパーシャロー'];
const SIZES = ['1.5号','2.0号','2.5号','3.0号','3.5号','4.0号'];
const COLORS = [
  {id:'purple',label:'パープル',hex:'#8B5CF6'},
  {id:'red',label:'レッド',hex:'#EF4444'},
  {id:'pink',label:'ピンク',hex:'#EC4899'},
  {id:'gold',label:'ゴールド',hex:'#F59E0B'},
  {id:'silver',label:'シルバー',hex:'#9CA3AF'},
  {id:'rainbow',label:'虹',hex:'rainbow'},
  {id:'490glow',label:'490グロー',hex:'#6EE7B7'},
  {id:'neobra-red',label:'ネオブラレッド',hex:'#DC2626'},
  {id:'neobra-blue',label:'ネオブラブルー',hex:'#2563EB'},
  {id:'neobra-green',label:'ネオブラグリーン',hex:'#16A34A'},
  {id:'glow',label:'夜光',hex:'#A3E635'},
  {id:'keimura',label:'ケイムラ',hex:'#A78BFA'},
];
const COLOR_VARIATIONS = ['無し','490','ネオレッド','ネオブルー','ネオグリーン','夜行','ケイムラ'];

// メインカラーのソート順
const COLOR_SORT_ORDER = ['glow','purple','red','490glow','neobra-red','pink','gold','neobra-blue','keimura','neobra-green','silver','rainbow'];
const TIME_ZONES = [
  {id:'night',label:'夜',icon:'🌙'},
  {id:'night-mazdome',label:'夜〜朝夕/マズメ',icon:'🌆'},
  {id:'mazdome',label:'朝夕/マズメ',icon:'🌅'},
  {id:'mazdome-day',label:'朝夕/マズメ〜日中',icon:'🌤️'},
  {id:'day',label:'日中',icon:'🌞'},
];
const WEATHERS = [
  {id:'sunny',label:'晴れ',icon:'☀️'},
  {id:'cloudy',label:'曇り',icon:'☁️'},
  {id:'rainy',label:'雨',icon:'🌧️'},
  {id:'wind',label:'風強',icon:'💨'},
  {id:'fog',label:'霧',icon:'🌫️'},
];


// ============================================================
// STATE
// ============================================================
let egis = [];
let filter = {type:'all',depth:'all',size:'all',time:'all',weather:'all',sea:'all',light:'all'};
let sortByColor = false;
let editingId = null;
let catchTargetId = null;
let egiPhotoData = null;
let catchPhotoData = null;

// ============================================================
// LOCAL STORAGE
// ============================================================
function save() {
  try {
    localStorage.setItem('egi-vault-data', JSON.stringify(egis));
  } catch(e) {
    console.warn('LocalStorage full');
  }
  updateStats();
  renderCards();
  // Save to Firebase
  if (window.saveToFirebase) {
    const indicator = document.getElementById('sync-indicator');
    if (indicator) indicator.textContent = '🔄 同期中...';
    // Strip _showCatches before saving
    const toSave = egis.map(e => { const c = {...e}; delete c._showCatches; return c; });
    window.saveToFirebase(toSave).then(ok => {
      if (indicator) indicator.textContent = ok ? '☁️ 同期済' : '⚠️ 同期失敗';
    });
  }
}

function load() {
  // Start with localStorage while Firebase loads
  const raw = localStorage.getItem('egi-vault-data');
  if (raw) { try { egis = JSON.parse(raw); } catch(e) { egis = []; } }
  else { egis = []; }
}

// Called when Firebase finishes loading - overwrite with cloud data
function reloadFromFirebase(firebaseEgis) {
  egis = firebaseEgis;
  try { localStorage.setItem('egi-vault-data', JSON.stringify(egis)); } catch(e) {}
  updateStats();
  renderCards();
  showToast('☁️ クラウドから同期しました');
}

// ============================================================
// JSON EXPORT / IMPORT
// ============================================================
function exportJSON() {
  const blob = new Blob([JSON.stringify(egis, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `egi-vault-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('💾 データを保存しました');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        egis = data;
        save();
        showToast('✅ データを読み込みました');
      } else { showToast('❌ ファイル形式が正しくありません'); }
    } catch(err) { showToast('❌ 読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
// FILTER BAR
// ============================================================
function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const filters = [
    {key:'type', options:[{v:'all',l:'全種類'},...EGI_TYPES.map(t=>({v:t,l:t}))]},
    {key:'size', options:[{v:'all',l:'全号数'},...SIZES.map(s=>({v:s,l:s}))]},
    {key:'depth', options:[{v:'all',l:'全タイプ'},...EGI_DEPTHS.map(d=>({v:d,l:d}))]},
    {key:'time', options:[{v:'all',l:'全時間'},...TIME_ZONES.map(t=>({v:t.id,l:t.icon+t.label}))]},
    {key:'weather', options:[{v:'all',l:'全天気'},...WEATHERS.map(w=>({v:w.id,l:w.icon+w.label}))]},
    {key:'sea', options:[{v:'all',l:'全水質'},{v:'1',l:'💧★☆☆☆☆'},{v:'2',l:'💧★★☆☆☆'},{v:'3',l:'💧★★★☆☆'},{v:'4',l:'💧★★★★☆'},{v:'5',l:'💧★★★★★'}]},
    {key:'light', options:[{v:'all',l:'全光量'},{v:'1',l:'☀️★☆☆☆☆'},{v:'2',l:'☀️★★☆☆☆'},{v:'3',l:'☀️★★★☆☆'},{v:'4',l:'☀️★★★★☆'},{v:'5',l:'☀️★★★★★'}]},
  ];
  filters.forEach(({key,options}) => {
    const sel = document.createElement('select');
    if (filter[key] !== 'all') sel.classList.add('active');
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.v; opt.textContent = o.l;
      if (o.v === filter[key]) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      filter[key] = sel.value;
      sel.classList.toggle('active', sel.value !== 'all');
      renderCards();
    };
    bar.appendChild(sel);
  });
}

// ============================================================
// RENDER CARDS
// ============================================================
function swatchStyle(colorId) {
  const c = COLORS.find(x=>x.id===colorId);
  if (!c) return '';
  if (c.id === 'rainbow') return 'background:linear-gradient(135deg,#EF4444,#F59E0B,#10B981,#3B82F6,#8B5CF6)';
  return `background:${c.hex}`;
}

function accentBar(colorId) {
  const c = COLORS.find(x=>x.id===colorId);
  if (!c) return '#0284C7';
  if (c.id === 'rainbow') return 'linear-gradient(90deg,#EF4444,#F59E0B,#10B981,#3B82F6,#8B5CF6)';
  return c.hex;
}

function toggleColorSort() {
  sortByColor = !sortByColor;
  const btn = document.getElementById('sort-color-btn');
  if (btn) {
    btn.style.background = sortByColor ? 'var(--accent-light)' : 'var(--surface-alt)';
    btn.style.borderColor = sortByColor ? 'var(--accent)' : 'var(--border)';
    btn.style.color = sortByColor ? 'var(--accent)' : 'var(--text-mid)';
    btn.style.fontWeight = sortByColor ? '700' : '400';
    btn.textContent = sortByColor ? '🎨 カラー順 ✓' : '🎨 カラー順';
  }
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');

  const filtered = egis.filter(e => {
    if (filter.type !== 'all' && e.type !== filter.type) return false;
    if (filter.depth !== 'all' && e.depth !== filter.depth) return false;
    if (filter.size !== 'all' && e.size !== filter.size) return false;
    if (filter.time !== 'all' && !(e.timezones||[]).includes(filter.time)) return false;
    if (filter.weather !== 'all' && !(e.weathers||[]).includes(filter.weather)) return false;
    if (filter.sea !== 'all' && String(e.waterClarity||'') !== filter.sea) return false;
    if (filter.light !== 'all' && String(e.lightLevel||'') !== filter.light) return false;
    return true;
  });

  // Sort by color if enabled
  if (sortByColor) {
    filtered.sort((a, b) => {
      const ai = COLOR_SORT_ORDER.indexOf(a.color);
      const bi = COLOR_SORT_ORDER.indexOf(b.color);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
  }

  empty.style.display = filtered.length === 0 ? 'block' : 'none';
  grid.innerHTML = '';

  filtered.forEach(egi => {
    const card = document.createElement('div');
    card.className = 'egi-card';
    const bar = accentBar(egi.color);

    const timeTags = (egi.timezones||[]).map(t => { const x=TIME_ZONES.find(z=>z.id===t); return x?`<span class="tag tag-time">${x.icon} ${x.label}</span>`:''; }).join('');
    const weatherTags = (egi.weathers||[]).map(w => { const x=WEATHERS.find(z=>z.id===w); return x?`<span class="tag tag-weather">${x.icon} ${x.label}</span>`:''; }).join('');
    const waterTag = egi.waterClarity ? `<span class="tag" style="background:#EFF6FF;color:#1D4ED8;border:1px solid #1D4ED820;">💧 ${'★'.repeat(egi.waterClarity)}${'☆'.repeat(5-egi.waterClarity)} ${WATER_CLARITY_LABELS[egi.waterClarity]}</span>` : '';
    const lightTag = egi.lightLevel ? `<span class="tag" style="background:#FEFCE8;color:#854D0E;border:1px solid #854D0E20;">☀️ ${'★'.repeat(egi.lightLevel)}${'☆'.repeat(5-egi.lightLevel)} ${LIGHT_LABELS[egi.lightLevel]}</span>` : '';
    const weightTag = egi.weight ? `<span class="tag" style="background:#F0FDF4;color:#166534;border:1px solid #16653420;">${egi.weight}g</span>` : '';
    const sinkTag = egi.sinkSpeed ? `<span class="tag" style="background:#FFF7ED;color:#9A3412;border:1px solid #9A341220;">${egi.sinkSpeed}秒/m</span>` : '';
    const colorName = (COLORS.find(c=>c.id===egi.color)||{label:egi.color}).label;
    const varLabel = egi.colorVariation && egi.colorVariation !== '無し' ? `<span class="card-color-var">/ ${egi.colorVariation}</span>` : '';
    const memoHtml = egi.memo ? `<div class="card-memo">📝 ${egi.memo}</div>` : '';
    const nameHtml = egi.name ? `<div class="card-name">${egi.name}</div>` : '';

    // EGI photo
    let photoHtml = '';
    if (egi.photo) {
      photoHtml = `<div class="egi-photo-wrap" onclick="openLightbox('${egi.id}','egi')">
        <img src="${egi.photo}" alt="エギ写真">
        <div class="egi-photo-overlay">🔍 拡大</div>
      </div>`;
    } else {
      photoHtml = `<div class="egi-photo-wrap" onclick="openAddEgiModalEdit('${egi.id}')" style="aspect-ratio:16/5;cursor:pointer;">
        <div class="egi-photo-placeholder"><span>📷</span><span style="font-size:11px">写真を追加</span></div>
      </div>`;
    }

    // catches
    const catchCount = (egi.catches||[]).length;
    let catchesHtml = '';
    if (egi._showCatches) {
      const items = (egi.catches||[]).map(c => {
        const photoEl = c.photo ? `<img class="catch-photo" src="${c.photo}" alt="" onclick="openLightboxDirect('${c.photo}')">` : '';
        return `<div class="catch-item">${photoEl}<div><div class="catch-size">🦑 ${c.size}cm</div><div class="catch-date">${c.date}</div>${c.note?`<div class="catch-note">${c.note}</div>`:''}</div></div>`;
      }).join('');
      catchesHtml = `<div class="catches-section">
        <div class="catches-header">
          <span class="catches-title">釣果記録</span>
          <button class="btn-add-catch" onclick="openCatchModal('${egi.id}')">＋ 釣果追加</button>
        </div>
        ${catchCount === 0 ? '<div class="catches-empty">まだ釣果記録がありません</div>' : `<div class="catch-list">${items}</div>`}
      </div>`;
    }

    card.innerHTML = `
      <div class="card-accent-bar" style="background:${bar}"></div>
      <div class="card-body">
        ${photoHtml}
        <div class="card-info">
          ${nameHtml}
          <div class="card-meta">
            <span class="card-type">${egi.type}</span>
            <span class="card-sep">·</span>
            <span class="card-depth">${egi.depth}</span>
          </div>
          <div class="card-color-row">
            <div class="color-swatch ${egi.color==='rainbow'?'rainbow':''}" style="${egi.color!=='rainbow'?swatchStyle(egi.color):''}"></div>
            <span class="card-color-name">${colorName}</span>
            ${varLabel}
          </div>
          <div class="tag-row">
            <span class="tag tag-size">${egi.size}</span>
            ${weightTag}${sinkTag}${timeTags}${weatherTags}${waterTag}${lightTag}
          </div>
          ${memoHtml}
          <div class="card-actions">
            <button class="btn-catches" onclick="toggleCatches('${egi.id}')">
              ${egi._showCatches ? '▲ 閉じる' : `🦑 釣果 ${catchCount}`}
            </button>
            <button class="btn-edit" onclick="openAddEgiModalEdit('${egi.id}')">✏️</button>
            <button class="btn-delete" onclick="deleteEgi('${egi.id}')">削除</button>
          </div>
        </div>
        ${catchesHtml}
      </div>`;
    grid.appendChild(card);
  });
}

function toggleCatches(id) {
  const egi = egis.find(e=>e.id===id);
  if (egi) { egi._showCatches = !egi._showCatches; renderCards(); }
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  document.getElementById('stat-egis').textContent = egis.length;
  const total = egis.reduce((s,e)=>s+(e.catches||[]).length, 0);
  document.getElementById('stat-catches').textContent = total;
  const sizes = egis.flatMap(e=>(e.catches||[]).map(c=>c.size)).filter(Boolean);
  if (sizes.length > 0) {
    document.getElementById('stat-best').textContent = Math.max(...sizes) + 'cm';
    document.getElementById('stat-best-wrap').style.display = '';
  } else {
    document.getElementById('stat-best-wrap').style.display = 'none';
  }
}


// ============================================================
// IMAGE COMPRESSION
// ============================================================
function compressImage(file, maxWidth, maxHeight, quality, callback) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      if (h > maxHeight) { w = Math.round(w * maxHeight / h); h = maxHeight; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ============================================================
// STAR RATING
// ============================================================
const WATER_CLARITY_LABELS = ['', '激濁り', '濁り', 'やや濁り', '澄み', '超澄み'];
const LIGHT_LABELS = ['', 'とても暗い', '暗い', '普通', '明るい', 'とても明るい'];

function setStarRating(type, val) {
  const prefix = type === 'water' ? 'water' : 'light';
  const inputId = type === 'water' ? 'f-water-clarity' : 'f-light-level';
  const labels = type === 'water' ? WATER_CLARITY_LABELS : LIGHT_LABELS;
  for (let i = 1; i <= 5; i++) {
    const star = document.getElementById(`${prefix}-star-${i}`);
    if (star) star.textContent = i <= val ? '★' : '☆';
    if (star) star.style.color = i <= val ? '#F59E0B' : '#CBD5E1';
  }
  document.getElementById(inputId).value = val;
  const lbl = document.getElementById(`${prefix}-label`);
  if (lbl) lbl.textContent = labels[val] || '';
}

function resetStarRating(type) {
  const prefix = type === 'water' ? 'water' : 'light';
  const inputId = type === 'water' ? 'f-water-clarity' : 'f-light-level';
  for (let i = 1; i <= 5; i++) {
    const star = document.getElementById(`${prefix}-star-${i}`);
    if (star) { star.textContent = '☆'; star.style.color = '#CBD5E1'; }
  }
  document.getElementById(inputId).value = '';
  const lbl = document.getElementById(`${prefix}-label`);
  if (lbl) lbl.textContent = '';
}

// ============================================================
// EGI MODAL
// ============================================================
function buildModalButtons() {
  function makeBtns(containerId, items, field, multi=false) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'sel-btn';
      btn.textContent = typeof item === 'string' ? item : (item.icon ? item.icon+' '+item.label : item.label);
      btn.dataset.val = typeof item === 'string' ? item : item.id;
      btn.onclick = () => {
        if (multi) { btn.classList.toggle('active'); }
        else { el.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
      };
      el.appendChild(btn);
    });
  }
  makeBtns('f-type-btns', EGI_TYPES, 'type');
  makeBtns('f-depth-btns', EGI_DEPTHS, 'depth');
  makeBtns('f-size-btns', SIZES, 'size');
  makeBtns('f-variation-btns', COLOR_VARIATIONS, 'colorVariation');
  makeBtns('f-time-btns', TIME_ZONES, 'timezones', true);
  makeBtns('f-weather-btns', WEATHERS, 'weathers', true);

  // Color buttons
  const colorEl = document.getElementById('f-color-btns');
  colorEl.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn';
    btn.dataset.val = c.id;
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c.id==='rainbow'?' rainbow':'');
    if (c.id !== 'rainbow') sw.style.background = c.hex;
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(c.label));
    btn.onclick = () => { colorEl.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); };
    colorEl.appendChild(btn);
  });
}

function getActiveVal(containerId) {
  const active = document.querySelector(`#${containerId} .active`);
  return active ? active.dataset.val : null;
}
function getActiveVals(containerId) {
  return [...document.querySelectorAll(`#${containerId} .active`)].map(b=>b.dataset.val);
}
function setActive(containerId, val) {
  document.querySelectorAll(`#${containerId} [data-val]`).forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
}
function setActiveMulti(containerId, vals) {
  document.querySelectorAll(`#${containerId} [data-val]`).forEach(b => {
    b.classList.toggle('active', vals.includes(b.dataset.val));
  });
}

function saveEgi() {
  const name = document.getElementById('f-name').value.trim();
  const weight = document.getElementById('f-weight').value ? parseFloat(document.getElementById('f-weight').value) : null;
  const sinkSpeed = document.getElementById('f-sink-speed').value ? parseFloat(document.getElementById('f-sink-speed').value) : null;
  const waterClarity = document.getElementById('f-water-clarity').value ? parseInt(document.getElementById('f-water-clarity').value) : null;
  const lightLevel = document.getElementById('f-light-level').value ? parseInt(document.getElementById('f-light-level').value) : null;
  const type = getActiveVal('f-type-btns') || EGI_TYPES[0];
  const depth = getActiveVal('f-depth-btns') || EGI_DEPTHS[0];
  const size = getActiveVal('f-size-btns') || SIZES[2];
  const color = getActiveVal('f-color-btns') || COLORS[0].id;
  const colorVariation = getActiveVal('f-variation-btns') || '無し';
  const timezones = getActiveVals('f-time-btns');
  const weathers = getActiveVals('f-weather-btns');
  const seaConditions = getActiveVals('f-sea-btns');
  const memo = document.getElementById('f-memo').value.trim();

  if (editingId) {
    const idx = egis.findIndex(e=>e.id===editingId);
    if (idx !== -1) {
      egis[idx] = {...egis[idx], name, weight, sinkSpeed, waterClarity, lightLevel, type, depth, size, color, colorVariation, timezones, weathers, memo, photo: egiPhotoData};
    }
    showToast('✅ エギを更新しました');
  } else {
    egis.unshift({id: Date.now().toString(), name, weight, sinkSpeed, waterClarity, lightLevel, type, depth, size, color, colorVariation, timezones, weathers, memo, photo: egiPhotoData, catches:[], _showCatches: false});
    showToast('✅ エギを追加しました');
  }
  save();
  closeEgiModal();
}

function deleteEgi(id) {
  if (!confirm('このエギを削除しますか？')) return;
  egis = egis.filter(e=>e.id!==id);
  save();
  showToast('🗑️ 削除しました');
}

function saveCatch() {
  const size = parseFloat(document.getElementById('c-size').value);
  if (!size) return;
  const note = document.getElementById('c-note').value.trim();
  const date = new Date().toLocaleDateString('ja-JP');
  const egi = egis.find(e=>e.id===catchTargetId);
  if (egi) {
    if (!egi.catches) egi.catches = [];
    egi.catches.push({size, note, photo: catchPhotoData, date});
    egi._showCatches = true;
  }
  save();
  closeCatchModal();
  showToast(`✅ ${size}cmの釣果を記録しました`);
}
